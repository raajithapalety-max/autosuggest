<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Suggest</title>
    <link rel="stylesheet" href="css/autosuggest.css">
</head>
<body>
    <div id="topbar">
        <span class="gear">⚙</span>
        <span id="topText">
            <span class="bullet">•</span> online |
            <span class="clock">🕒</span> - ms
        </span>
    </div>

    <div class="heading">
        <h1><span id="being">Being</span>Infinity</h1>
        <p>One million phrases. Four algorithms. Prefix Based Auto Suggest</p>

        <div class="search-container">
            <input
                id="searchbar"
                type="text"
                placeholder="🔍 Start typing to search phrases..."
            >
            <div id="search-suggestions"></div>
        </div>
    </div>

    <script src="./js/autosuggest.js"></script>
</body>
</html>
